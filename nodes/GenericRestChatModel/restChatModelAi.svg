<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Fundo escuro circular -->
  <circle cx="30" cy="30" r="30" fill="#0f0f1a"/>

  <!-- Corpo do chip (representa API) -->
  <rect x="15" y="15" width="30" height="30" rx="4" ry="4"
        fill="#1a1a2e" stroke="#ffffff" stroke-width="2"/>

  <!-- Pinos superiores -->
  <line x1="22" y1="15" x2="22" y2="9"  stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="15" x2="30" y2="9"  stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="15" x2="38" y2="9"  stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>

  <!-- Pinos inferiores -->
  <line x1="22" y1="45" x2="22" y2="51" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="45" x2="30" y2="51" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="45" x2="38" y2="51" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>

  <!-- Pinos esquerdos -->
  <line x1="15" y1="22" x2="9"  y2="22" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="30" x2="9"  y2="30" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="38" x2="9"  y2="38" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>

  <!-- Pinos direitos -->
  <line x1="45" y1="22" x2="51" y2="22" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="30" x2="51" y2="30" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="38" x2="51" y2="38" stroke="#00D4B8" stroke-width="2" stroke-linecap="round"/>

  <!-- Rede neural interna (representa IA) -->
  <line x1="30" y1="22" x2="23" y2="33" stroke="#00D4B8" stroke-width="1.3" opacity="0.8"/>
  <line x1="30" y1="22" x2="37" y2="33" stroke="#00D4B8" stroke-width="1.3" opacity="0.8"/>
  <line x1="23" y1="33" x2="37" y2="33" stroke="#00D4B8" stroke-width="1.3" opacity="0.8"/>

  <circle cx="30" cy="22" r="3" fill="#00D4B8"/>
  <circle cx="23" cy="33" r="3" fill="#00D4B8"/>
  <circle cx="37" cy="33" r="3" fill="#00D4B8"/>
</svg>
